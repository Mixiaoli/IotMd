<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IotMd Web</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb}
    .wrap{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .sidebar{background:#1f2937;color:#fff;padding:16px;overflow:auto}
    .main{padding:20px}
    .card{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    input,textarea,button,select{width:100%;padding:8px;margin-top:6px;margin-bottom:10px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .hist{background:#111827;border-radius:8px;padding:10px;margin-bottom:8px}
    .muted{color:#9ca3af;font-size:12px}
  </style>
</head>
<body>
<div id="app">
  <div v-if="!token" class="main">
    <div class="card" style="max-width:420px;margin:40px auto;">
      <h2>登录</h2>
      <input v-model="loginForm.username" placeholder="用户名" />
      <input v-model="loginForm.password" placeholder="密码" type="password" />
      <button @click="doLogin">登录</button>
      <p class="muted">默认管理员：admin / admin123</p>
    </div>
  </div>

  <div v-else class="wrap">
    <aside class="sidebar">
      <h3>历史问题</h3>
      <div v-for="h in history" :key="h.id" class="hist">
        <div>{{ h.question }}</div>
        <div class="muted">{{ h.created_at }}</div>
      </div>
    </aside>
    <main class="main">
      <div class="card">
        <h2>AI 交互</h2>
        <textarea rows="3" v-model="question" placeholder="输入问题"></textarea>
        <button @click="ask">发送</button>
        <div v-if="answer">
          <h4>回答</h4>
          <pre>{{ answer }}</pre>
        </div>
      </div>

      <div class="card" v-if="me && me.is_admin">
        <h2>后台管理</h2>
        <div class="row">
          <button @click="loadUsers">用户权限管理</button>
          <button @click="loadQuestions">问题列表记录管理</button>
        </div>
        <button @click="loadModels">API 大模型管理</button>

        <div v-if="users.length">
          <h4>用户</h4>
          <div v-for="u in users" :key="u.id" class="card">
            <b>{{u.username}}</b>
            <label><input type="checkbox" v-model="u.is_admin"/> 管理员</label>
            <label><input type="checkbox" v-model="u.can_use_ai"/> AI权限</label>
            <button @click="saveUser(u)">保存权限</button>
          </div>
        </div>

        <div v-if="questions.length">
          <h4>问题记录</h4>
          <div v-for="q in questions" :key="q.id" class="card">
            <div><b>{{q.username}}</b>: {{q.question}}</div>
            <pre>{{q.answer}}</pre>
          </div>
        </div>

        <div v-if="models.length || true">
          <h4>模型配置</h4>
          <div class="row">
            <input v-model="newModel.name" placeholder="模型名称" />
            <input v-model="newModel.provider" placeholder="供应商" />
          </div>
          <input v-model="newModel.base_url" placeholder="base_url" />
          <input v-model="newModel.api_key" placeholder="api_key" />
          <label><input type="checkbox" v-model="newModel.is_active" /> 设为激活</label>
          <button @click="createModel">新增模型</button>
          <div v-for="m in models" :key="m.id" class="card">
            <div><b>{{m.name}}</b> ({{m.provider}}) - Active: {{m.is_active}}</div>
            <button @click="activateModel(m.id)">激活此模型</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
const { createApp } = Vue
createApp({
  data(){
    return {
      token: localStorage.getItem('token') || '',
      me: null,
      loginForm: { username: 'admin', password: 'admin123' },
      question: '', answer: '', history: [], users: [], questions: [], models: [],
      newModel: {name:'', provider:'openai-compatible', base_url:'', api_key:'', is_active:false}
    }
  },
  methods:{
    async api(path, options={}){
      const res = await fetch(path, {
        ...options,
        headers:{'Content-Type':'application/json', ...(this.token?{'Authorization':'Bearer '+this.token}:{})}
      })
      if(!res.ok) throw new Error((await res.json()).detail || '请求失败')
      return await res.json()
    },
    async doLogin(){
      const data = await this.api('/api/auth/login',{method:'POST',body:JSON.stringify(this.loginForm)})
      this.token = data.token
      localStorage.setItem('token', this.token)
      await this.loadMe(); await this.loadHistory(); if(this.me.is_admin){await this.loadModels()}
    },
    async loadMe(){ this.me = await this.api('/api/auth/me') },
    async ask(){
      const data = await this.api('/api/chat',{method:'POST',body:JSON.stringify({question:this.question})})
      this.answer = data.answer
      this.question=''
      await this.loadHistory()
    },
    async loadHistory(){ this.history = await this.api('/api/history') },
    async loadUsers(){ this.users = await this.api('/api/admin/users') },
    async loadQuestions(){ this.questions = await this.api('/api/admin/questions') },
    async loadModels(){ this.models = await this.api('/api/admin/models') },
    async saveUser(u){ await this.api(`/api/admin/users/${u.id}`,{method:'PATCH',body:JSON.stringify({is_admin:u.is_admin, can_use_ai:u.can_use_ai})}) },
    async createModel(){ await this.api('/api/admin/models',{method:'POST',body:JSON.stringify(this.newModel)}); this.newModel={name:'',provider:'openai-compatible',base_url:'',api_key:'',is_active:false}; await this.loadModels() },
    async activateModel(id){ await this.api(`/api/admin/models/${id}/activate`,{method:'PATCH'}); await this.loadModels() }
  },
  async mounted(){ if(this.token){ await this.loadMe(); await this.loadHistory(); if(this.me.is_admin){await this.loadModels()} } }
}).mount('#app')
</script>
</body>
</html>
